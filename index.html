<!DOCTYPE html>
<html>
<head>
  <title>Class Kingdom</title>
</head>
<body>

<h1>Class Kingdom</h1>

<input id="name" placeholder="Your name">
<button onclick="login()">Start</button>

<p id="player"></p>
<p id="gold">Gold: 0</p>

<button onclick="addGold()">+10 Gold</button>

<!-- Supabase v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://zfseazpheehiawebxrgx.supabase.co";
const supabaseKey = "sb_publishable_2NpNBMV2yoVX5kNKLZyzPA_WCCEGt2Y";

const { createClient } = supabase;
const supabaseClient = createClient(supabaseUrl, supabaseKey);

let playerId = null;

async function login() {
  const name = document.getElementById("name").value;

  if (!name) {
    alert("Enter a name");
    return;
  }

  // Check if player exists
  let { data, error } = await supabaseClient
    .from("players")
    .select("*")
    .eq("name", name);

  if (error) {
    console.log(error);
    alert("Error login");
    return;
  }

  if (data.length > 0) {
    playerId = data[0].id;
    updateUI(data[0]);
  } else {
    let { data: newPlayer, error: insertError } = await supabaseClient
      .from("players")
      .insert([{ name: name }])
      .select();

    if (insertError) {
      console.log(insertError);
      alert("Error creating player");
      return;
    }

    playerId = newPlayer[0].id;
    updateUI(newPlayer[0]);
  }
}

function updateUI(player) {
  document.getElementById("player").innerText = "Player: " + player.name;
  document.getElementById("gold").innerText = "Gold: " + player.gold;
}

async function addGold() {
  if (!playerId) {
    alert("Login first");
    return;
  }

  let { data, error } = await supabaseClient
    .from("players")
    .select("*")
    .eq("id", playerId)
    .single();

  if (error) {
    console.log(error);
    return;
  }

  let newGold = data.gold + 10;

  let { error: updateError } = await supabaseClient
    .from("players")
    .update({ gold: newGold })
    .eq("id", playerId);

  if (updateError) {
    console.log(updateError);
    return;
  }

  document.getElementById("gold").innerText = "Gold: " + newGold;
}
</script>

</body>
</html>
