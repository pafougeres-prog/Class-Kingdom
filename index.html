<!DOCTYPE html>
<html>
  <!-- TITRE ONGLET WEB -->
<head>
  <title>Class Kingdom</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<!-- TITRE -->
<h1>Class Kingdom</h1>
  
<input id="nickname" placeholder="Nickname">
<input id="password" placeholder="Password (5 digits)" type="password">
<button onclick="login()">Login</button>
<div id="game" style="display: flex; justify-content: space-between; align-items: flex-start;">

  <!-- 🧍 COTE JOUEUR (GAUCHE) -->
  <div id="playerSide" style="width: 45%; text-align: center;">
    <img id="player_class" width="150" style="image-rendering: pixelated;">
    <p id="player"></p>
    <p id="tribe"></p>
    <p id="stats">❤️ 0 | 🛡️ 0 | ⚔️ 0</p>
    <p id="gold">Gold: 0</p>
<!-- SHOP -->
<button onclick="buyChest()">Buy Chest (100 gold)</button>
<!-- INVENTAIRE-->
        <div id="inventory"></div>
    </div> <!-- FIN COTE JOUEUR -->



  
  <!-- 👹 BOSS + QUÊTE (DROITE) -->
  <div id="questSide" style="width: 45%; text-align: center;">
    
    <img id="boss_img" src="images/quest1/stick_master.png"
         width="150"
         style="image-rendering: pixelated;">

    <br><br>

    <button onclick="startQuest1()">Quest 1</button>

    <div id="dialogue" style="margin-top: 20px;"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="main.js"></script>
<script src="quest1.js"></script>

</body>
</html>
