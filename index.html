<!DOCTYPE html>
<html>
<head>
  <title>Class Kingdom</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Class Kingdom</h1>
  
<input id="nickname" placeholder="Nickname">
<input id="password" placeholder="Password (5 digits)" type="password">
<button onclick="login()">Login</button>
  
<div>
  <img id="player_class" width="120" style="image-rendering: pixelated;">
  <p id="player"></p>
  <p id="tribe"></p>
  <p id="stats">❤️ 0 | 🛡️ 0 | ⚔️ 0</p>
  <p id="gold">Gold: 0</p>
</div>

<button onclick="addGold()">+10 Gold</button>
<button onclick="startQuest1()">Quest 1</button>

<div id="quest">

  <div id="boss">
    <img src="images/quest1/stick_master.png" width="150" style="image-rendering: pixelated;">
  </div>

  <div id="dialogue"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="main.js"></script>
<script src="quest1.js"></script>

</body>
</html>
